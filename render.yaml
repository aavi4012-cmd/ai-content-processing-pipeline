services:
  # 1. Redis Broker — Essential for asynchronous Celery tasks
  - type: redis
    name: pipeline-redis
    ipAllowList: [] # Access restricted to internal network for maximum security
    plan: free

  # 2. Main API & Worker — Unified container for cost-efficiency on Render's free tier
  - type: web
    name: ai-content-pipeline
    env: docker
    plan: free
    healthCheckPath: /
    # The Dockerfile CMD ./start.sh runs both Uvicorn + Celery
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pipeline-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: pipeline-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false # Set this in the Render dashboard after clicking deploy

databases:
  # 3. Dedicated PostgreSQL — Persistent storage for submissions & results
  - name: pipeline-db
    databaseName: ai_pipeline
    user: admin
    plan: free
