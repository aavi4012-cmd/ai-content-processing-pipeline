services:
  # ── PostgreSQL Database ────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: pipeline_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_pipeline
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis Message Broker ───────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pipeline_redis
    restart: always

  # ── FastAPI Web Server ─────────────────────────────────────
  api:
    build: .
    container_name: pipeline_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # ── Celery Background Worker ───────────────────────────────
  worker:
    build: .
    container_name: pipeline_worker
    command: celery -A app.queue.celery_app worker --loglevel=info -P solo
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
